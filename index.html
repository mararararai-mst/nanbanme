<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>なんばんめ マスター｜さんすう1ねん</title>
<meta name="description" content="小学1年生のさんすう「なんばんめ」を、タップと音声で楽しく学べる教材アプリ。集合数と順序数のちがい・前後・上下・左右・二次元の位置まで6ステージ。">
<meta property="og:title" content="なんばんめ マスター｜さんすう1ねん">
<meta property="og:description" content="集合数と順序数のちがい・前後・上下・左右・二次元の位置まで、6ステージで楽しく学ぶ1年生の算数教材。">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mochiy+Pop+One&family=Zen+Maru+Gothic:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ffd3e0; --mint:#d3ffd9; --sky:#d3f0ff; --lemon:#fff3c4; --lav:#e0d3ff; --peach:#ffe0d3;
  --ink:#5a4a52; --ink2:#7d6b73; --line:#ffffff;
  --ok:#5fc77f; --ng:#ff8a9a;
  --shadow:0 6px 0 rgba(0,0,0,.07), 0 10px 22px rgba(0,0,0,.10);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  margin:0; font-family:'Zen Maru Gothic','Hiragino Maru Gothic ProN','Rounded Mplus 1c',sans-serif;
  color:var(--ink);
  background:linear-gradient(135deg,#fff5f8 0%,#f3fbff 45%,#fffdf2 100%);
  background-attachment:fixed;
  overflow-x:hidden;
}
#app{max-width:960px; margin:0 auto; padding:14px 14px 40px; min-height:100%;}

/* ===== topbar ===== */
.topbar{display:flex; align-items:center; gap:10px; margin-bottom:8px;}
.brand{font-family:'Mochiy Pop One',sans-serif; font-size:clamp(1.1rem,4.6vw,1.6rem); color:#ff8fb0; letter-spacing:.02em; word-break:keep-all;}
.brand .sub{font-family:'Zen Maru Gothic'; font-weight:700; font-size:.62em; color:var(--ink2); margin-left:6px;}
.spacer{flex:1;}
.iconbtn{
  border:none; background:#fff; color:var(--ink); font-family:inherit; font-weight:700;
  font-size:.95rem; padding:8px 14px; border-radius:999px; cursor:pointer; white-space:nowrap; flex-shrink:0;
  box-shadow:0 3px 0 rgba(0,0,0,.06),0 6px 12px rgba(0,0,0,.08); transition:transform .08s;
}
.iconbtn:active{transform:translateY(2px);}
.iconbtn.off{opacity:.5;}

/* ===== menu ===== */
.menu-title{text-align:center; margin:14px 0 6px;}
.menu-title h1{font-family:'Mochiy Pop One',sans-serif; font-size:clamp(1.7rem,8vw,3rem); margin:0; color:#ff7fa8;
  text-shadow:0 3px 0 #ffe1ec;}
.menu-title p{margin:6px 0 0; color:var(--ink2); font-weight:700; font-size:clamp(.85rem,3.6vw,1.05rem);}
.grid{display:grid; grid-template-columns:repeat(2,1fr); gap:14px; margin-top:18px;}
@media(min-width:620px){.grid{grid-template-columns:repeat(3,1fr);}}
.stage-card{
  border:none; cursor:pointer; border-radius:26px; padding:20px 14px 16px; text-align:center;
  font-family:inherit; color:var(--ink); box-shadow:var(--shadow); transition:transform .1s;
  position:relative; display:flex; flex-direction:column; align-items:center; gap:6px; min-height:150px; justify-content:center;
}
.stage-card:active{transform:translateY(3px) scale(.99);}
.stage-card .em{font-size:clamp(2.4rem,11vw,3.4rem); line-height:1;}
.stage-card .no{position:absolute; top:10px; left:14px; font-family:'Mochiy Pop One'; font-size:1.1rem; color:#fff; opacity:.9;}
.stage-card .ti{font-weight:900; font-size:clamp(.92rem,4vw,1.08rem); line-height:1.25; word-break:keep-all;}
.stage-card .stars{font-size:1rem; letter-spacing:2px; color:#ffb83d; height:1.2em;}
.stage-card .stars .empty{color:rgba(0,0,0,.12);}

/* ===== stage screen ===== */
.stage-head{display:flex; align-items:center; gap:10px; margin:6px 0 12px;}
.backbtn{border:none; background:#fff; cursor:pointer; font-family:inherit; font-weight:900; color:var(--ink2);
  border-radius:999px; padding:8px 16px; box-shadow:0 3px 0 rgba(0,0,0,.06); font-size:.95rem;}
.backbtn:active{transform:translateY(2px);}
.stage-head .h-ti{font-family:'Mochiy Pop One'; font-size:clamp(1rem,5vw,1.4rem); color:var(--ink);}
.progress{display:flex; gap:6px; margin:0 0 14px;}
.progress .dot{flex:1; height:9px; border-radius:999px; background:rgba(0,0,0,.08);}
.progress .dot.done{background:var(--ok);}
.progress .dot.now{background:#ffd24d;}

.qbar{display:flex; align-items:center; gap:12px; background:#fff; border-radius:22px; padding:14px 16px;
  box-shadow:var(--shadow); margin-bottom:8px;}
.qbar .qtext{font-weight:900; font-size:clamp(1.05rem,5vw,1.5rem); line-height:1.35; flex:1; word-break:keep-all; overflow-wrap:break-word;}
.qbar .qtext b.g{color:#3aa0e0;} .qbar .qtext b.s{color:#ff7aa0;}
.qhint{text-align:center; color:var(--ink2); font-weight:700; font-size:clamp(.8rem,3.6vw,.98rem); margin:2px 0 14px;}
.speakbtn{border:none; cursor:pointer; background:var(--lemon); border-radius:18px; padding:12px; font-size:1.4rem;
  box-shadow:0 3px 0 rgba(0,0,0,.06); flex-shrink:0;}
.speakbtn:active{transform:translateY(2px);}
.qbar.speakable{cursor:pointer;}
.qbar.speakable:active{transform:scale(.995);}

/* play area */
.play{background:#fff; border-radius:26px; padding:18px 14px; box-shadow:var(--shadow); position:relative; overflow:hidden;}

.row{display:flex; align-items:center; justify-content:center; gap:clamp(4px,1.6vw,12px); flex-wrap:nowrap;}
.endlabel{font-family:'Mochiy Pop One'; font-size:clamp(.75rem,3.2vw,1rem); color:#fff; background:#ffb0c4;
  padding:6px 8px; border-radius:12px; flex-shrink:0; writing-mode:horizontal-tb;}
.endlabel.mae{background:#7ec8f0;} .endlabel.ushiro{background:#f0a37e;}
.endlabel.hidari{background:#9b8ce0;} .endlabel.migi{background:#e08cc8;}
.endlabel.ue{background:#7ec8f0;} .endlabel.shita{background:#f0a37e;}

.card{
  border:3px solid #f0eef0; background:#fff; border-radius:20px; cursor:pointer; font-family:inherit;
  padding:8px 6px 6px; min-width:clamp(46px,13vw,84px); display:flex; flex-direction:column; align-items:center; gap:2px;
  box-shadow:0 4px 0 rgba(0,0,0,.05); transition:transform .08s, border-color .12s, background .12s;
}
.card:active{transform:translateY(2px);}
.card .ce{font-size:clamp(1.9rem,8.5vw,3.2rem); line-height:1;}
.card .cn{font-size:clamp(.6rem,2.8vw,.8rem); font-weight:700; color:var(--ink2);}
.card.sel{border-color:#ffce4d; background:#fffae8; transform:translateY(-3px);}
.card.correct{border-color:var(--ok); background:#eafff0; animation:pop .35s;}
.card.wrong{border-color:var(--ng); background:#ffeef1; animation:shake .35s;}
.card[disabled]{cursor:default;}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.18)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-7px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* vertical (building) */
.col{display:flex; flex-direction:column; align-items:center; gap:clamp(4px,1.4vw,10px);}
.col .card{flex-direction:row; min-width:auto; width:clamp(150px,55vw,230px); justify-content:flex-start; gap:12px; padding:8px 16px;}
.col .card .ce{font-size:clamp(1.7rem,7vw,2.6rem);}
.col .card .cn{font-size:clamp(.7rem,3.4vw,.95rem);}

/* grid (classroom) */
.gridwrap{display:grid; grid-template-columns:auto auto auto; grid-template-rows:auto auto auto;
  gap:8px; align-items:center; justify-items:center; width:fit-content; margin:0 auto;}
.seatgrid{display:grid; gap:clamp(5px,1.6vw,12px);}
.seat{border:3px solid #f0eef0; background:#fff; border-radius:16px; cursor:pointer; padding:6px;
  font-size:clamp(1.5rem,7vw,2.4rem); line-height:1; box-shadow:0 4px 0 rgba(0,0,0,.05); transition:transform .08s,border-color .12s,background .12s;}
.seat:active{transform:translateY(2px);}
.seat.correct{border-color:var(--ok); background:#eafff0; animation:pop .35s;}
.seat.wrong{border-color:var(--ng); background:#ffeef1; animation:shake .35s;}

/* contrast (stage2) */
.contrast{margin-top:14px; background:#fbf7ff; border-radius:18px; padding:12px 14px; border:2px dashed #d9c7f0;}
.contrast .line{display:flex; align-items:center; gap:10px; margin:6px 0; flex-wrap:wrap;}
.contrast .tag{font-weight:900; border-radius:10px; padding:4px 10px; color:#fff; flex-shrink:0; font-size:.95rem;}
.contrast .tag.g{background:#3aa0e0;} .contrast .tag.s{background:#ff7aa0;}
.contrast .mini{font-size:1.5rem; display:flex; gap:2px;}
.contrast .mini .hl{outline:3px solid #ffce4d; border-radius:8px; background:#fffae8;}
.contrast .desc{font-weight:700; color:var(--ink2);}

/* feedback bar */
.fb{display:flex; align-items:center; justify-content:center; gap:14px; margin-top:14px; min-height:64px;}
.fb .msg{font-family:'Mochiy Pop One'; font-size:clamp(1.2rem,6vw,1.8rem);}
.fb .msg.ok{color:var(--ok);} .fb .msg.ng{color:#ff7088;}
.nextbtn,.confirmbtn{border:none; cursor:pointer; font-family:'Mochiy Pop One'; color:#fff; font-size:clamp(1rem,4.6vw,1.3rem);
  padding:12px 26px; border-radius:999px; box-shadow:0 4px 0 rgba(0,0,0,.12); transition:transform .08s;}
.nextbtn{background:#ff9bbb;} .confirmbtn{background:#ffce4d; color:#7a5a00;}
.nextbtn:active,.confirmbtn:active{transform:translateY(3px);}

/* clear screen */
.clear{text-align:center; background:#fff; border-radius:30px; padding:34px 20px; box-shadow:var(--shadow); margin-top:10px;}
.clear .big{font-family:'Mochiy Pop One'; font-size:clamp(1.5rem,6vw,2.4rem); color:#ff7fa8; line-height:1.3;}
.clear .em{font-size:clamp(3rem,16vw,5rem);}
.clear .gotstars{font-size:clamp(2rem,10vw,3rem); letter-spacing:6px; color:#ffb83d; margin:10px 0;}
.clear .gotstars .empty{color:rgba(0,0,0,.12);}
.clear .btns{display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin-top:18px;}

/* sparkles */
.spark{position:absolute; pointer-events:none; font-size:1.6rem; animation:rise 1.1s ease-out forwards;}
@keyframes rise{0%{transform:translateY(0) scale(.6); opacity:0;}20%{opacity:1;}100%{transform:translateY(-90px) scale(1.2); opacity:0;}}

/* 正解の〇（まる）スタンプ */
.maru{position:absolute; pointer-events:none; z-index:20; border-radius:50%;
  width:clamp(86px,24vw,132px); height:clamp(86px,24vw,132px);
  border:clamp(8px,2.2vw,13px) solid #ff4d6d; box-shadow:0 0 0 4px rgba(255,77,109,.18);
  transform:translate(-50%,-50%) scale(0) rotate(-8deg); opacity:0;
  animation:stamp .5s cubic-bezier(.18,1.5,.4,1) forwards;}
@keyframes stamp{0%{transform:translate(-50%,-50%) scale(1.9) rotate(-8deg); opacity:0;}
  55%{opacity:1;}100%{transform:translate(-50%,-50%) scale(1) rotate(-8deg); opacity:1;}}

.footer{text-align:center; color:var(--ink2); font-size:.72rem; margin-top:26px; opacity:.7;}
</style>
</head>
<body>
<div id="app"></div>

<script>
"use strict";
/* ====== データ（教科書準拠） ====== */
const RUNNERS = [ {n:'タヌキ',e:'🦝'},{n:'キツネ',e:'🦊'},{n:'ブタ',e:'🐷'},{n:'ネコ',e:'🐱'},{n:'イヌ',e:'🐶'} ]; // 1ばん→5ばん
const LINEUP  = [ {n:'ネズミ',e:'🐭'},{n:'リス',e:'🐿️'},{n:'パンダ',e:'🐼'},{n:'イヌ',e:'🐶'},{n:'クマ',e:'🐻'},{n:'ウサギ',e:'🐰'} ]; // まえ→うしろ
const BUILDING= [ {n:'ネコ',e:'🐱'},{n:'パンダ',e:'🐼'},{n:'キツネ',e:'🦊'},{n:'ブタ',e:'🐷'},{n:'ウサギ',e:'🐰'},{n:'タヌキ',e:'🦝'} ]; // うえ→した
const FRUITS  = [ {n:'バナナ',e:'🍌'},{n:'イチゴ',e:'🍓'},{n:'メロン',e:'🍈'},{n:'リンゴ',e:'🍎'},{n:'パイナップル',e:'🍍'},{n:'ブドウ',e:'🍇'} ]; // ひだり→みぎ
const SEATPOOL= ['🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵','🐔','🐧','🦆'];

const STAGES = [
  {id:1, key:'kakekko',   em:'🏁', ti:'かけっこ なんい？', color:'var(--pink)',  num:'#ff9bbb'},
  {id:2, key:'ninme',     em:'🐼', ti:'3にん？ 3にんめ？', color:'var(--sky)',   num:'#5fb3e0'},
  {id:3, key:'maeushiro', em:'🚗', ti:'まえから・うしろから', color:'var(--lemon)', num:'#e8b94d'},
  {id:4, key:'ueshita',   em:'🏠', ti:'うえから・したから', color:'var(--lav)',   num:'#a98fe0'},
  {id:5, key:'hidarimigi',em:'🍎', ti:'ひだり・みぎ', color:'var(--mint)',  num:'#6fc77f'},
  {id:6, key:'seki',      em:'🪑', ti:'せきは どこ？', color:'var(--peach)', num:'#f0996b'},
];
const Q_PER = 5;

/* ====== 状態 ====== */
const $ = s=>document.querySelector(s);
const app = $('#app');
let voiceOn = true;
let stars = loadStars();
let st = null; // 現在ステージ状態

/* ====== ユーティリティ ====== */
function loadStars(){ try{return JSON.parse(localStorage.getItem('nanbanme_stars')||'{}');}catch(e){return {};} }
function saveStars(){ try{localStorage.setItem('nanbanme_stars',JSON.stringify(stars));}catch(e){} }
function ri(a,b){ return a+Math.floor(Math.random()*(b-a+1)); }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function pickUnique(min,max,count){ // 重複なしで数を選ぶ（足りなければ重複可）
  const pool=[]; for(let v=min;v<=max;v++)pool.push(v);
  const sh=shuffle(pool); const out=[];
  for(let i=0;i<count;i++){ out.push(sh.length? sh[i%sh.length] : ri(min,max)); }
  return out;
}
function speak(text){
  if(!voiceOn || !('speechSynthesis' in window)) return;
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(text);
    u.lang='ja-JP'; u.rate=0.95; u.pitch=1.05; speechSynthesis.speak(u);
  }catch(e){}
}
function starStr(n){ let s=''; for(let i=0;i<3;i++) s+= i<n? '★' : '<span class="empty">★</span>'; return s; }

/* ====== メニュー ====== */
function renderMenu(){
  st=null;
  app.innerHTML = `
  <div class="topbar">
    <div class="brand">なんばんめ マスター<span class="sub">さんすう 1ねん</span></div>
    <div class="spacer"></div>
    <button class="iconbtn ${voiceOn?'':'off'}" id="voiceToggle">${voiceOn?'🔊 おん':'🔇 おふ'}</button>
  </div>
  <div class="menu-title">
    <h1>なんばんめ</h1>
    <p>すきな ステージを えらんでね ✿</p>
  </div>
  <div class="grid" id="stageGrid"></div>
  <div class="footer">© なんばんめ マスター ／ さんすう1ねん 教材アプリ</div>`;

  const grid = $('#stageGrid');
  STAGES.forEach(s=>{
    const got = stars[s.id]||0;
    const b=document.createElement('button');
    b.className='stage-card'; b.style.background=s.color;
    b.innerHTML=`<span class="no" style="color:${s.num}">${s.id}</span>
      <span class="em">${s.em}</span>
      <span class="ti">${s.ti}</span>
      <span class="stars">${starStr(got)}</span>`;
    b.onclick=()=>startStage(s.id);
    grid.appendChild(b);
  });
  $('#voiceToggle').onclick=()=>{ voiceOn=!voiceOn; if(!voiceOn)speechSynthesis&&speechSynthesis.cancel(); renderMenu(); };
}

/* ====== 問題生成 ====== */
function genQuestions(id){
  const qs=[];
  if(id===1){
    const ranks = pickUnique(1,5,Q_PER);
    ranks.forEach(r=>qs.push({set:RUNNERS, layout:'runner', answer:r-1,
      text:`${r}ばん の どうぶつ は どれかな？`, say:`${r}ばんの どうぶつは どれかな？`}));
  }
  if(id===2){
    for(let i=0;i<Q_PER;i++){
      const ref = Math.random()<.5?'まえ':'うしろ';
      const single = Math.random()<.5;
      if(single){
        const n=ri(1,6); const ans = ref==='まえ'? n-1 : 6-n;
        qs.push({set:LINEUP, layout:'select', mode:'single', ref, n, ends:['mae','ushiro'],
          correct:new Set([ans]),
          text:`${ref}から <b class="s">${n}にんめ</b> を えらんでね`,
          hint:'1ぴきだけ えらぼう', say:`${ref}から ${n}にんめを えらんでね`});
      }else{
        const n=ri(2,5); const set=new Set();
        if(ref==='まえ'){ for(let k=0;k<n;k++)set.add(k); } else { for(let k=0;k<n;k++)set.add(5-k); }
        qs.push({set:LINEUP, layout:'select', mode:'group', ref, n, ends:['mae','ushiro'],
          correct:set,
          text:`${ref}から <b class="g">${n}にん</b> を えらんでね`,
          hint:'あつまりを ぜんぶ えらぼう（みどりの あつまり）', say:`${ref}から ${n}にんを えらんでね`});
      }
    }
  }
  if(id===3){
    for(let i=0;i<Q_PER;i++){
      const ref=Math.random()<.5?'まえ':'うしろ'; const n=ri(1,6);
      const ans=ref==='まえ'? n-1 : 6-n;
      const cars=[]; for(let k=0;k<6;k++)cars.push({n:'',e:'🚗'});
      qs.push({set:cars, layout:'row', ends:['mae','ushiro'], answer:ans,
        text:`${ref}から <b>${n}だいめ</b> の くるま を タップ！`, say:`${ref}から ${n}だいめの くるまを タップしてね`});
    }
  }
  if(id===4){
    for(let i=0;i<Q_PER;i++){
      const ref=Math.random()<.5?'うえ':'した'; const n=ri(1,6);
      const ans=ref==='うえ'? n-1 : 6-n;
      qs.push({set:BUILDING, layout:'col', ends:['ue','shita'], answer:ans,
        text:`${ref}から <b>${n}ばんめ</b> の どうぶつ を タップ！`, say:`${ref}から ${n}ばんめの どうぶつを タップしてね`});
    }
  }
  if(id===5){
    for(let i=0;i<Q_PER;i++){
      const ref=Math.random()<.5?'ひだり':'みぎ'; const n=ri(1,6);
      const ans=ref==='ひだり'? n-1 : 6-n;
      qs.push({set:FRUITS, layout:'row', ends:['hidari','migi'], answer:ans,
        text:`${ref}から <b>${n}ばんめ</b> の くだもの を タップ！`, say:`${ref}から ${n}ばんめの くだものを タップしてね`});
    }
  }
  if(id===6){
    const ROWS=3, COLS=4;
    const animals = shuffle(SEATPOOL).slice(0,ROWS*COLS);
    for(let i=0;i<Q_PER;i++){
      const rowRef=Math.random()<.5?'まえ':'うしろ'; const r=ri(1,ROWS);
      const colRef=Math.random()<.5?'ひだり':'みぎ'; const c=ri(1,COLS);
      const ridx = rowRef==='まえ'? r-1 : ROWS-r;
      const cidx = colRef==='ひだり'? c-1 : COLS-c;
      const ans = ridx*COLS+cidx;
      qs.push({layout:'seat', animals, rows:ROWS, cols:COLS, answer:ans,
        text:`${rowRef}から <b>${r}ばんめ</b>、${colRef}から <b>${c}ばんめ</b> の どうぶつ を タップ！`,
        say:`${rowRef}から ${r}ばんめ、${colRef}から ${c}ばんめの どうぶつを タップしてね`});
    }
  }
  return qs;
}

/* ====== ステージ開始 ====== */
function startStage(id){
  const stage = STAGES.find(s=>s.id===id);
  st = { id, stage, qs:genQuestions(id), qi:0, mistakes:0, selected:new Set(), answered:false };
  renderQuestion();
}

function renderQuestion(){
  const q = st.qs[st.qi];
  st.selected = new Set(); st.answered=false;
  let dots=''; for(let i=0;i<st.qs.length;i++){ dots+=`<div class="dot ${i<st.qi?'done':(i===st.qi?'now':'')}"></div>`; }

  app.innerHTML = `
  <div class="stage-head">
    <button class="backbtn" id="back">← もどる</button>
    <div class="h-ti">${st.stage.em} ${st.stage.ti}</div>
  </div>
  <div class="progress">${dots}</div>
  <div class="qbar${voiceOn?' speakable':''}">
    <div class="qtext">${q.text}</div>
    ${voiceOn?'<button class="speakbtn" id="speak" title="もんだいを よみあげ">🔊</button>':''}
  </div>
  <div class="qhint">${q.hint||'こたえだと おもう ものを タップしてね'}${voiceOn?' ・ 🔊タップで よみあげ':''}</div>
  <div class="play" id="play"></div>
  <div class="fb" id="fb"></div>`;

  $('#back').onclick=renderMenu;
  if(voiceOn){ const qbar=document.querySelector('.qbar'); if(qbar) qbar.onclick=()=>speak(q.say); }
  renderPlay(q);
}

/* ====== プレイ領域の描画 ====== */
function renderPlay(q){
  const play=$('#play');
  if(q.layout==='runner' || q.layout==='row' || q.layout==='select'){
    const wrap=document.createElement('div'); wrap.className='row';
    if(q.layout==='runner'){ const g=document.createElement('div'); g.className='endlabel'; g.style.background='#ffd24d'; g.style.color='#7a5a00'; g.textContent='🏁ゴール'; wrap.appendChild(g); }
    if(q.ends){ wrap.appendChild(endLabel(q.ends[0])); }
    q.set.forEach((it,idx)=>{
      const c=mkCard(it,idx,q);
      wrap.appendChild(c);
    });
    if(q.ends){ wrap.appendChild(endLabel(q.ends[1])); }
    play.appendChild(wrap);
    if(q.layout==='select'){ // 確認ボタン
      // ボタンはfbに置く
    }
  } else if(q.layout==='col'){
    const wrap=document.createElement('div'); wrap.className='col';
    wrap.appendChild(endLabel(q.ends[0]));
    q.set.forEach((it,idx)=> wrap.appendChild(mkCard(it,idx,q)) );
    wrap.appendChild(endLabel(q.ends[1]));
    play.appendChild(wrap);
  } else if(q.layout==='seat'){
    renderSeats(q,play);
  }
  // select モードは確認ボタンを出す
  if(q.layout==='select'){
    const fb=$('#fb');
    fb.innerHTML=`<button class="confirmbtn" id="confirm">✓ できた！</button>`;
    $('#confirm').onclick=()=>checkSelect(q);
  }
  fitPlay();
}

/* 横並びが幅に収まらなければ自動で縮小（タブレット縦・狭い画面対策） */
function fitPlay(){
  const play=$('#play'); if(!play) return;
  const el = play.querySelector('.row') || play.querySelector('.gridwrap');
  if(!el) return;
  el.style.transform=''; el.style.transformOrigin='center top';
  const cs=getComputedStyle(play);
  const avail = play.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight) - 16; // 左右に少し余白
  const w = el.scrollWidth;
  if(w>avail){
    const s=Math.max(0.5, avail/w);
    el.style.transform=`scale(${s})`;
    // 縮小で余る縦の隙間を詰める
    el.style.marginBottom = (-(el.offsetHeight*(1-s))) + 'px';
  } else {
    el.style.marginBottom='';
  }
}

function endLabel(kind){
  const map={mae:'まえ',ushiro:'うしろ',hidari:'ひだり',migi:'みぎ',ue:'うえ',shita:'した'};
  const d=document.createElement('div'); d.className='endlabel '+kind; d.textContent=map[kind]; return d;
}

function mkCard(it,idx,q){
  const c=document.createElement('button'); c.className='card'; c.dataset.idx=idx;
  c.innerHTML=`<span class="ce">${it.e}</span>${it.n?`<span class="cn">${it.n}</span>`:''}`;
  c.onclick=()=>{
    if(st.answered) return;
    if(voiceOn && it.n) speak(it.n);
    if(q.layout==='select'){
      if(st.selected.has(idx)){ st.selected.delete(idx); c.classList.remove('sel'); }
      else { st.selected.add(idx); c.classList.add('sel'); }
    } else {
      judgeTap(idx,q,c);
    }
  };
  return c;
}

function renderSeats(q,play){
  const wrap=document.createElement('div'); wrap.className='gridwrap';
  const blank=()=>{const d=document.createElement('div');return d;};
  // 行: [空][まえ][空] / [ひだり][grid][みぎ] / [空][うしろ][空]
  wrap.appendChild(blank()); wrap.appendChild(txtEnd('まえ','mae')); wrap.appendChild(blank());
  wrap.appendChild(txtEnd('ひだり','hidari'));
  const sg=document.createElement('div'); sg.className='seatgrid';
  sg.style.gridTemplateColumns=`repeat(${q.cols},1fr)`;
  q.animals.forEach((em,idx)=>{
    const s=document.createElement('button'); s.className='seat'; s.textContent=em; s.dataset.idx=idx;
    s.onclick=()=>{ if(!st.answered) judgeTap(idx,q,s); };
    sg.appendChild(s);
  });
  wrap.appendChild(sg);
  wrap.appendChild(txtEnd('みぎ','migi'));
  wrap.appendChild(blank()); wrap.appendChild(txtEnd('うしろ','ushiro')); wrap.appendChild(blank());
  play.appendChild(wrap);
}
function txtEnd(text,kind){ const d=document.createElement('div'); d.className='endlabel '+kind; d.textContent=text; return d; }

/* ====== 判定 ====== */
function judgeTap(idx,q,el){
  if(idx===q.answer){
    st.answered=true;
    el.classList.add('correct');
    showMaru(el);
    sparkle(el);
    onCorrect(q);
  } else {
    st.mistakes++;
    el.classList.add('wrong');
    setTimeout(()=>el.classList.remove('wrong'),400);
    flashNg();
  }
}

function checkSelect(q){
  if(st.answered) return;
  const sel=st.selected;
  let ok = sel.size===q.correct.size;
  if(ok){ for(const v of q.correct){ if(!sel.has(v)){ ok=false; break; } } }
  if(ok){
    st.answered=true;
    // 正解カードを緑に
    document.querySelectorAll('#play .card').forEach(c=>{
      if(q.correct.has(+c.dataset.idx)){ c.classList.remove('sel'); c.classList.add('correct'); }
      c.disabled=true;
    });
    const cc=[...document.querySelectorAll('#play .card.correct')];
    showMaru(cc[Math.floor(cc.length/2)]);
    sparkle($('#play'));
    onCorrect(q);
  } else {
    st.mistakes++;
    document.querySelectorAll('#play .card.sel').forEach(c=>{ c.classList.add('wrong'); setTimeout(()=>c.classList.remove('wrong'),400); });
    flashNg();
  }
}

function showMaru(anchor){
  const play=$('#play'); if(!play||!anchor) return;
  const pr=play.getBoundingClientRect(), ar=anchor.getBoundingClientRect();
  const m=document.createElement('div'); m.className='maru';
  m.style.left=(ar.left-pr.left+ar.width/2)+'px';
  m.style.top =(ar.top -pr.top +ar.height/2)+'px';
  play.appendChild(m);
}

function onCorrect(q){
  if(st.id===2){ $('#play').insertAdjacentHTML('beforeend', contrastHtml(q)); }
  const fb=$('#fb'); const last = st.qi===st.qs.length-1;
  fb.innerHTML = `<div class="msg ok">せいかい！🎉</div><button class="nextbtn" id="next">${last?'けっか ▶':'つぎへ ▶'}</button>`;
  const nb=$('#next');
  nb.onclick=()=>{
    st.qi++;
    if(st.qi>=st.qs.length) finishStage();
    else renderQuestion();
  };
  try{ nb.scrollIntoView({block:'nearest'}); }catch(e){}
}

function contrastHtml(q){
  const set=LINEUP, ref=q.ref, n=q.n;
  // group版とsingle版の両方を描く
  const groupIdx=new Set(), singleIdx = ref==='まえ'? n-1 : set.length-n;
  if(ref==='まえ'){ for(let k=0;k<n;k++)groupIdx.add(k); } else { for(let k=0;k<n;k++)groupIdx.add(set.length-1-k); }
  const mini=(hlSet)=> set.map((it,i)=>`<span class="${hlSet.has(i)?'hl':''}">${it.e}</span>`).join('');
  return `<div class="contrast">
    <div class="line"><span class="tag g">${ref}から ${n}にん</span><span class="mini">${mini(groupIdx)}</span><span class="desc">＝ あつまり（${n}ひき）</span></div>
    <div class="line"><span class="tag s">${ref}から ${n}にんめ</span><span class="mini">${mini(new Set([singleIdx]))}</span><span class="desc">＝ 1ぴきだけ</span></div>
  </div>`;
}

/* ====== 演出 ====== */
function sparkle(anchor){
  const play=$('#play'); const rect=anchor.getBoundingClientRect(); const pr=play.getBoundingClientRect();
  const cx=rect.left-pr.left+rect.width/2, cy=rect.top-pr.top+rect.height/2;
  const ems=['✨','⭐','🌟','💫','🎉'];
  for(let i=0;i<6;i++){
    const s=document.createElement('div'); s.className='spark'; s.textContent=ems[ri(0,ems.length-1)];
    s.style.left=(cx+ri(-40,40))+'px'; s.style.top=(cy+ri(-10,10))+'px'; s.style.animationDelay=(i*40)+'ms';
    play.appendChild(s); setTimeout(()=>s.remove(),1200);
  }
}
function flashNg(){
  const fb=$('#fb'); if(!fb) return;
  // 既存のボタン（✓できた等）は消さず、メッセージだけ一時表示する
  let m=fb.querySelector('.msg.ng');
  if(!m){ m=document.createElement('div'); m.className='msg ng'; fb.insertBefore(m, fb.firstChild); }
  m.textContent='もういちど！';
  clearTimeout(flashNg._t);
  flashNg._t=setTimeout(()=>{ const fb2=$('#fb'); const mm=fb2&&fb2.querySelector('.msg.ng'); if(mm && !st.answered) mm.remove(); }, 1000);
}

/* ====== ステージクリア ====== */
function finishStage(){
  let got=3; if(st.mistakes>=1)got=2; if(st.mistakes>=3)got=1;
  if((stars[st.id]||0)<got){ stars[st.id]=got; saveStars(); }
  const msg = st.mistakes===0? 'パーフェクト！すごい！' : (got>=2? 'よく できました！' : 'クリア！がんばったね！');
  app.innerHTML = `
  <div class="clear">
    <div class="em">${st.mistakes===0?'🏆':'🎉'}</div>
    <div class="big">${msg}</div>
    <div class="gotstars">${starStr(got)}</div>
    <div style="color:var(--ink2);font-weight:700;">まちがい ${st.mistakes}かい</div>
    <div class="btns">
      <button class="nextbtn" id="again" style="background:#ffce4d;color:#7a5a00;">🔁 もういちど</button>
      <button class="nextbtn" id="menu">🏠 メニューへ</button>
    </div>
  </div>`;
  $('#again').onclick=()=>startStage(st.id);
  $('#menu').onclick=renderMenu;
}

/* ====== 起動 ====== */
if('speechSynthesis' in window){ speechSynthesis.getVoices(); speechSynthesis.onvoiceschanged=()=>speechSynthesis.getVoices(); }
window.addEventListener('resize', ()=>{ if(st && $('#play')) fitPlay(); });
renderMenu();
</script>
